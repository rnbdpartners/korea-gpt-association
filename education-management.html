<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>교육 관리 시스템 | 한국GPT협회</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="education-management.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- FullCalendar CSS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/main.min.css' rel='stylesheet' />
    <!-- Flatpickr CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body>
    <!-- 헤더 -->
    <header class="admin-header">
        <div class="admin-nav">
            <h1 class="admin-logo">
                <i class="fas fa-graduation-cap"></i>
                한국GPT협회 교육관리
            </h1>
            <nav class="admin-menu">
                <a href="#" class="nav-item active" data-view="calendar">
                    <i class="fas fa-calendar"></i> 캘린더
                </a>
                <a href="#" class="nav-item" data-view="instructors">
                    <i class="fas fa-chalkboard-teacher"></i> 강사관리
                </a>
                <a href="#" class="nav-item" data-view="curriculum">
                    <i class="fas fa-book"></i> 커리큘럼
                </a>
                <a href="#" class="nav-item" data-view="students">
                    <i class="fas fa-users"></i> 수강생
                </a>
                <a href="#" class="nav-item" data-view="venues">
                    <i class="fas fa-building"></i> 강의실
                </a>
                <a href="#" class="nav-item" data-view="reports">
                    <i class="fas fa-chart-bar"></i> 리포트
                </a>
            </nav>
            <div class="admin-actions">
                <button class="btn-icon" onclick="toggleNotifications()">
                    <i class="fas fa-bell"></i>
                    <span class="notification-badge">3</span>
                </button>
                <button class="btn-icon" onclick="openSettings()">
                    <i class="fas fa-cog"></i>
                </button>
                <div class="user-menu">
                    <img src="https://via.placeholder.com/32" alt="Admin">
                    <span>관리자</span>
                </div>
            </div>
        </div>
    </header>

    <!-- 메인 컨테이너 -->
    <div class="management-container">
        <!-- 사이드바 -->
        <aside class="sidebar">
            <div class="sidebar-section">
                <h3>빠른 추가</h3>
                <button class="btn-quick-add" onclick="quickAddClass()">
                    <i class="fas fa-plus"></i> 새 강의
                </button>
                <button class="btn-quick-add" onclick="quickAddInstructor()">
                    <i class="fas fa-user-plus"></i> 새 강사
                </button>
                <button class="btn-quick-add" onclick="quickAddCurriculum()">
                    <i class="fas fa-book-medical"></i> 새 커리큘럼
                </button>
            </div>

            <div class="sidebar-section">
                <h3>필터</h3>
                <div class="filter-group">
                    <label>강사</label>
                    <div class="filter-tags" id="instructorFilters">
                        <!-- 동적 생성 -->
                    </div>
                </div>
                <div class="filter-group">
                    <label>과정</label>
                    <div class="filter-tags" id="courseFilters">
                        <span class="filter-tag active" data-filter="all">전체</span>
                        <span class="filter-tag" data-filter="basic">기초</span>
                        <span class="filter-tag" data-filter="intermediate">중급</span>
                        <span class="filter-tag" data-filter="advanced">고급</span>
                    </div>
                </div>
                <div class="filter-group">
                    <label>상태</label>
                    <div class="filter-tags" id="statusFilters">
                        <span class="filter-tag active" data-filter="all">전체</span>
                        <span class="filter-tag" data-filter="scheduled">예정</span>
                        <span class="filter-tag" data-filter="completed">완료</span>
                        <span class="filter-tag" data-filter="cancelled">취소</span>
                    </div>
                </div>
            </div>

            <div class="sidebar-section">
                <h3>오늘의 일정</h3>
                <div class="today-schedule" id="todaySchedule">
                    <!-- 동적 생성 -->
                </div>
            </div>
        </aside>

        <!-- 메인 콘텐츠 -->
        <main class="main-content">
            <!-- 캘린더 뷰 -->
            <div class="view-container" id="calendarView">
                <div class="view-header">
                    <h2>교육 일정 캘린더</h2>
                    <div class="view-controls">
                        <div class="view-toggle">
                            <button class="toggle-btn active" data-view="month">월</button>
                            <button class="toggle-btn" data-view="week">주</button>
                            <button class="toggle-btn" data-view="day">일</button>
                            <button class="toggle-btn" data-view="list">목록</button>
                        </div>
                        <button class="btn-primary" onclick="openNewClassModal()">
                            <i class="fas fa-plus"></i> 강의 추가
                        </button>
                    </div>
                </div>
                <div id="calendar" class="calendar-container"></div>
            </div>

            <!-- 강사 관리 뷰 -->
            <div class="view-container" id="instructorsView" style="display: none;">
                <div class="view-header">
                    <h2>강사 관리</h2>
                    <div class="view-controls">
                        <input type="text" class="search-input" placeholder="강사 검색...">
                        <button class="btn-primary" onclick="openNewInstructorModal()">
                            <i class="fas fa-plus"></i> 강사 추가
                        </button>
                    </div>
                </div>
                <div class="instructors-grid" id="instructorsGrid">
                    <!-- 동적 생성 -->
                </div>
            </div>

            <!-- 커리큘럼 관리 뷰 -->
            <div class="view-container" id="curriculumView" style="display: none;">
                <div class="view-header">
                    <h2>커리큘럼 관리</h2>
                    <div class="view-controls">
                        <input type="text" class="search-input" placeholder="커리큘럼 검색...">
                        <button class="btn-primary" onclick="openNewCurriculumModal()">
                            <i class="fas fa-plus"></i> 커리큘럼 추가
                        </button>
                    </div>
                </div>
                <div class="curriculum-list" id="curriculumList">
                    <!-- 동적 생성 -->
                </div>
            </div>

            <!-- 수강생 관리 뷰 -->
            <div class="view-container" id="studentsView" style="display: none;">
                <div class="view-header">
                    <h2>수강생 관리</h2>
                    <div class="view-controls">
                        <input type="text" class="search-input" placeholder="수강생 검색...">
                        <select class="filter-select">
                            <option value="">전체 과정</option>
                            <option value="basic">기초 과정</option>
                            <option value="intermediate">중급 과정</option>
                            <option value="advanced">고급 과정</option>
                        </select>
                    </div>
                </div>
                <div class="students-table">
                    <table>
                        <thead>
                            <tr>
                                <th>이름</th>
                                <th>이메일</th>
                                <th>회사</th>
                                <th>수강 과정</th>
                                <th>출석률</th>
                                <th>상태</th>
                                <th>액션</th>
                            </tr>
                        </thead>
                        <tbody id="studentsTableBody">
                            <!-- 동적 생성 -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- 강의실 관리 뷰 -->
            <div class="view-container" id="venuesView" style="display: none;">
                <div class="view-header">
                    <h2>강의실 관리</h2>
                    <div class="view-controls">
                        <button class="btn-primary" onclick="openNewVenueModal()">
                            <i class="fas fa-plus"></i> 강의실 추가
                        </button>
                    </div>
                </div>
                <div class="venues-grid" id="venuesGrid">
                    <!-- 동적 생성 -->
                </div>
            </div>

            <!-- 리포트 뷰 -->
            <div class="view-container" id="reportsView" style="display: none;">
                <div class="view-header">
                    <h2>리포트 & 통계</h2>
                    <div class="view-controls">
                        <input type="month" class="month-picker" id="reportMonth">
                        <button class="btn-secondary" onclick="exportReport()">
                            <i class="fas fa-download"></i> 내보내기
                        </button>
                    </div>
                </div>
                <div class="reports-dashboard">
                    <div class="stat-cards">
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-calendar-check"></i></div>
                            <div class="stat-content">
                                <h3>이번 달 강의</h3>
                                <p class="stat-number">24</p>
                                <span class="stat-change positive">+12%</span>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-users"></i></div>
                            <div class="stat-content">
                                <h3>총 수강생</h3>
                                <p class="stat-number">385</p>
                                <span class="stat-change positive">+8%</span>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-star"></i></div>
                            <div class="stat-content">
                                <h3>평균 만족도</h3>
                                <p class="stat-number">4.8</p>
                                <span class="stat-change">-</span>
                            </div>
                        </div>
                        <div class="stat-card">
                            <div class="stat-icon"><i class="fas fa-won-sign"></i></div>
                            <div class="stat-content">
                                <h3>이번 달 매출</h3>
                                <p class="stat-number">45.2M</p>
                                <span class="stat-change positive">+15%</span>
                            </div>
                        </div>
                    </div>
                    <div class="charts-section">
                        <div class="chart-container">
                            <canvas id="monthlyChart"></canvas>
                        </div>
                        <div class="chart-container">
                            <canvas id="instructorChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 모달: 새 강의 추가 -->
    <div class="modal" id="newClassModal">
        <div class="modal-content large">
            <div class="modal-header">
                <h3>새 강의 추가</h3>
                <button class="modal-close" onclick="closeModal('newClassModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="newClassForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>강의명 <span class="required">*</span></label>
                            <input type="text" name="title" required>
                        </div>
                        <div class="form-group">
                            <label>커리큘럼 <span class="required">*</span></label>
                            <select name="curriculum" required>
                                <option value="">선택하세요</option>
                                <!-- 동적 옵션 -->
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>강사 <span class="required">*</span></label>
                            <select name="instructor" required>
                                <option value="">선택하세요</option>
                                <!-- 동적 옵션 -->
                            </select>
                        </div>
                        <div class="form-group">
                            <label>수업 형태 <span class="required">*</span></label>
                            <select name="locationType" required>
                                <option value="offline">오프라인</option>
                                <option value="online">온라인</option>
                                <option value="hybrid">하이브리드</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>시작 일시 <span class="required">*</span></label>
                            <input type="text" name="startDateTime" class="datetime-picker" required>
                        </div>
                        <div class="form-group">
                            <label>종료 일시 <span class="required">*</span></label>
                            <input type="text" name="endDateTime" class="datetime-picker" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>장소/링크</label>
                        <input type="text" name="location" placeholder="오프라인 주소 또는 온라인 링크">
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>최대 인원</label>
                            <input type="number" name="maxParticipants" value="30">
                        </div>
                        <div class="form-group">
                            <label>캘린더 색상</label>
                            <input type="color" name="color" value="#2196F3">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>메모</label>
                        <textarea name="notes" rows="3"></textarea>
                    </div>
                    
                    <div class="form-actions">
                        <button type="button" class="btn-secondary" onclick="closeModal('newClassModal')">취소</button>
                        <button type="submit" class="btn-primary">강의 추가</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 모달: 강의 상세/수정 -->
    <div class="modal" id="classDetailModal">
        <div class="modal-content large">
            <div class="modal-header">
                <h3 id="classDetailTitle">강의 상세</h3>
                <button class="modal-close" onclick="closeModal('classDetailModal')">&times;</button>
            </div>
            <div class="modal-body" id="classDetailContent">
                <!-- 동적 생성 -->
            </div>
        </div>
    </div>

    <!-- 모달: 새 강사 추가 -->
    <div class="modal" id="newInstructorModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>새 강사 추가</h3>
                <button class="modal-close" onclick="closeModal('newInstructorModal')">&times;</button>
            </div>
            <div class="modal-body">
                <form id="newInstructorForm">
                    <div class="form-group">
                        <label>이름 <span class="required">*</span></label>
                        <input type="text" name="name" required>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>이메일 <span class="required">*</span></label>
                            <input type="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label>연락처</label>
                            <input type="tel" name="phone">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>전문 분야</label>
                        <div class="tag-input">
                            <input type="text" placeholder="태그 입력 후 Enter">
                            <div class="tags-container"></div>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>경력(년)</label>
                            <input type="number" name="experienceYears" min="0">
                        </div>
                        <div class="form-group">
                            <label>시간당 강의료</label>
                            <input type="number" name="hourlyRate" placeholder="원">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>가능한 요일</label>
                        <div class="checkbox-group">
                            <label><input type="checkbox" name="availableDays" value="월"> 월</label>
                            <label><input type="checkbox" name="availableDays" value="화"> 화</label>
                            <label><input type="checkbox" name="availableDays" value="수"> 수</label>
                            <label><input type="checkbox" name="availableDays" value="목"> 목</label>
                            <label><input type="checkbox" name="availableDays" value="금"> 금</label>
                            <label><input type="checkbox" name="availableDays" value="토"> 토</label>
                            <label><input type="checkbox" name="availableDays" value="일"> 일</label>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>소개</label>
                        <textarea name="bio" rows="4"></textarea>
                    </div>
                    <div class="form-actions">
                        <button type="button" class="btn-secondary" onclick="closeModal('newInstructorModal')">취소</button>
                        <button type="submit" class="btn-primary">강사 추가</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- 드래그 중 표시될 요소 -->
    <div class="drag-preview" id="dragPreview"></div>

    <!-- Scripts -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.9/index.global.min.js'></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="js/education-management.js"></script>
    <script src="js/education-calendar.js"></script>
    <script src="js/education-data-sync.js"></script>
</body>
</html>
