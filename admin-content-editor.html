<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>콘텐츠 편집기 | 한국GPT협회 관리자</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="admin-content-editor.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- 편집 툴바 -->
    <div class="editor-toolbar">
        <div class="toolbar-section">
            <h3><i class="fas fa-edit"></i> 콘텐츠 편집기</h3>
            <span class="edit-mode-badge">편집 모드 ON</span>
        </div>
        
        <div class="toolbar-section">
            <button class="toolbar-btn" onclick="contentEditor.toggleEditMode()">
                <i class="fas fa-power-off"></i> 편집 모드
            </button>
            <button class="toolbar-btn" onclick="contentEditor.saveAll()">
                <i class="fas fa-save"></i> 모두 저장
            </button>
            <button class="toolbar-btn" onclick="contentEditor.preview()">
                <i class="fas fa-eye"></i> 미리보기
            </button>
            <button class="toolbar-btn" onclick="contentEditor.publish()">
                <i class="fas fa-upload"></i> 게시
            </button>
        </div>
        
        <div class="toolbar-section">
            <select class="page-selector" onchange="contentEditor.switchPage(this.value)">
                <option value="index">홈페이지</option>
                <option value="online-class">온라인 클래스</option>
                <option value="offline-class">오프라인 클래스</option>
                <option value="enterprise">기업교육</option>
                <option value="community">커뮤니티</option>
            </select>
            <button class="toolbar-btn" onclick="window.close()">
                <i class="fas fa-times"></i> 닫기
            </button>
        </div>
    </div>

    <!-- 사이드 패널 -->
    <div class="editor-sidebar">
        <!-- 요소 선택 정보 -->
        <div class="sidebar-section" id="elementInfo">
            <h4>선택된 요소</h4>
            <p class="no-selection">요소를 선택하세요</p>
        </div>

        <!-- 편집 도구 -->
        <div class="sidebar-section" id="editTools" style="display: none;">
            <!-- 텍스트 편집 -->
            <div class="edit-panel" id="textEditPanel">
                <h4>텍스트 편집</h4>
                <div class="form-group">
                    <label>내용</label>
                    <textarea id="textContent" rows="4"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>글꼴 크기</label>
                        <input type="number" id="fontSize" min="10" max="72">
                    </div>
                    <div class="form-group">
                        <label>색상</label>
                        <input type="color" id="textColor">
                    </div>
                </div>
                <div class="form-group">
                    <label>정렬</label>
                    <div class="button-group">
                        <button class="align-btn" data-align="left"><i class="fas fa-align-left"></i></button>
                        <button class="align-btn" data-align="center"><i class="fas fa-align-center"></i></button>
                        <button class="align-btn" data-align="right"><i class="fas fa-align-right"></i></button>
                        <button class="align-btn" data-align="justify"><i class="fas fa-align-justify"></i></button>
                    </div>
                </div>
            </div>

            <!-- 이미지 편집 -->
            <div class="edit-panel" id="imageEditPanel" style="display: none;">
                <h4>이미지 편집</h4>
                <div class="form-group">
                    <label>이미지 URL</label>
                    <input type="text" id="imageSrc">
                    <button class="btn-small" onclick="contentEditor.openMediaLibrary()">
                        <i class="fas fa-folder-open"></i> 미디어 라이브러리
                    </button>
                </div>
                <div class="form-group">
                    <label>대체 텍스트</label>
                    <input type="text" id="imageAlt">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>너비</label>
                        <input type="number" id="imageWidth">
                    </div>
                    <div class="form-group">
                        <label>높이</label>
                        <input type="number" id="imageHeight">
                    </div>
                </div>
            </div>

            <!-- 링크 편집 -->
            <div class="edit-panel" id="linkEditPanel" style="display: none;">
                <h4>링크 편집</h4>
                <div class="form-group">
                    <label>링크 URL</label>
                    <input type="text" id="linkHref">
                </div>
                <div class="form-group">
                    <label>열기 방식</label>
                    <select id="linkTarget">
                        <option value="_self">같은 창</option>
                        <option value="_blank">새 창</option>
                    </select>
                </div>
            </div>

            <!-- 버튼 편집 -->
            <div class="edit-panel" id="buttonEditPanel" style="display: none;">
                <h4>버튼 편집</h4>
                <div class="form-group">
                    <label>버튼 텍스트</label>
                    <input type="text" id="buttonText">
                </div>
                <div class="form-group">
                    <label>클릭 액션</label>
                    <select id="buttonAction">
                        <option value="link">링크 이동</option>
                        <option value="popup">팝업 열기</option>
                        <option value="download">파일 다운로드</option>
                        <option value="scroll">스크롤 이동</option>
                    </select>
                </div>
                <div class="form-group" id="buttonActionValue">
                    <label>값</label>
                    <input type="text" id="actionValue">
                </div>
                <div class="form-group">
                    <label>스타일</label>
                    <select id="buttonStyle">
                        <option value="primary">Primary</option>
                        <option value="secondary">Secondary</option>
                        <option value="success">Success</option>
                        <option value="danger">Danger</option>
                    </select>
                </div>
            </div>

            <!-- 섹션 편집 -->
            <div class="edit-panel" id="sectionEditPanel" style="display: none;">
                <h4>섹션 편집</h4>
                <div class="form-group">
                    <label>배경색</label>
                    <input type="color" id="sectionBgColor">
                </div>
                <div class="form-group">
                    <label>패딩</label>
                    <div class="form-row">
                        <input type="number" id="paddingTop" placeholder="상">
                        <input type="number" id="paddingRight" placeholder="우">
                        <input type="number" id="paddingBottom" placeholder="하">
                        <input type="number" id="paddingLeft" placeholder="좌">
                    </div>
                </div>
                <div class="form-group">
                    <label>표시/숨김</label>
                    <label class="toggle">
                        <input type="checkbox" id="sectionVisible">
                        <span class="toggle-slider"></span>
                    </label>
                </div>
            </div>

            <!-- 적용 버튼 -->
            <div class="edit-actions">
                <button class="btn-apply" onclick="contentEditor.applyChanges()">
                    <i class="fas fa-check"></i> 변경사항 적용
                </button>
                <button class="btn-cancel" onclick="contentEditor.cancelEdit()">
                    <i class="fas fa-times"></i> 취소
                </button>
            </div>
        </div>

        <!-- 컴포넌트 라이브러리 -->
        <div class="sidebar-section">
            <h4>컴포넌트 추가</h4>
            <div class="component-library">
                <div class="component-item" draggable="true" data-component="hero">
                    <i class="fas fa-flag"></i>
                    <span>히어로 섹션</span>
                </div>
                <div class="component-item" draggable="true" data-component="feature">
                    <i class="fas fa-th-large"></i>
                    <span>특징 섹션</span>
                </div>
                <div class="component-item" draggable="true" data-component="testimonial">
                    <i class="fas fa-quote-right"></i>
                    <span>후기 섹션</span>
                </div>
                <div class="component-item" draggable="true" data-component="cta">
                    <i class="fas fa-bullhorn"></i>
                    <span>CTA 섹션</span>
                </div>
                <div class="component-item" draggable="true" data-component="pricing">
                    <i class="fas fa-tag"></i>
                    <span>가격표</span>
                </div>
                <div class="component-item" draggable="true" data-component="faq">
                    <i class="fas fa-question-circle"></i>
                    <span>FAQ</span>
                </div>
                <div class="component-item" draggable="true" data-component="popup">
                    <i class="fas fa-window-restore"></i>
                    <span>팝업</span>
                </div>
                <div class="component-item" draggable="true" data-component="banner">
                    <i class="fas fa-bell"></i>
                    <span>공지 배너</span>
                </div>
            </div>
        </div>

        <!-- 미디어 라이브러리 -->
        <div class="sidebar-section">
            <h4>미디어 파일</h4>
            <button class="btn-upload" onclick="contentEditor.uploadMedia()">
                <i class="fas fa-cloud-upload-alt"></i> 파일 업로드
            </button>
            <div class="media-grid" id="mediaGrid">
                <!-- 미디어 파일 목록 -->
            </div>
        </div>
    </div>

    <!-- 메인 편집 영역 (iframe) -->
    <div class="editor-main">
        <iframe id="editorFrame" src="index.html" frameborder="0"></iframe>
    </div>

    <!-- 팝업 설정 모달 -->
    <div class="modal" id="popupSettingsModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>팝업 설정</h3>
                <button class="modal-close" onclick="contentEditor.closeModal('popupSettingsModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>팝업 제목</label>
                    <input type="text" id="popupTitle">
                </div>
                <div class="form-group">
                    <label>내용</label>
                    <textarea id="popupContent" rows="5"></textarea>
                </div>
                <div class="form-group">
                    <label>표시 조건</label>
                    <select id="popupTrigger">
                        <option value="onload">페이지 로드 시</option>
                        <option value="exit">페이지 이탈 시</option>
                        <option value="scroll">스크롤 50% 시</option>
                        <option value="time">일정 시간 후</option>
                    </select>
                </div>
                <div class="form-group" id="popupDelayGroup" style="display: none;">
                    <label>지연 시간 (초)</label>
                    <input type="number" id="popupDelay" value="5">
                </div>
                <div class="form-group">
                    <label>쿠키 설정</label>
                    <div class="checkbox-group">
                        <label>
                            <input type="checkbox" id="popupCookie">
                            오늘 하루 보지 않기 옵션 제공
                        </label>
                    </div>
                </div>
                <div class="form-actions">
                    <button class="btn-secondary" onclick="contentEditor.closeModal('popupSettingsModal')">취소</button>
                    <button class="btn-primary" onclick="contentEditor.savePopupSettings()">저장</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 미디어 라이브러리 모달 -->
    <div class="modal" id="mediaLibraryModal">
        <div class="modal-content large">
            <div class="modal-header">
                <h3>미디어 라이브러리</h3>
                <button class="modal-close" onclick="contentEditor.closeModal('mediaLibraryModal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="media-upload-area">
                    <input type="file" id="mediaUpload" multiple accept="image/*,video/*,.pdf,.doc,.docx">
                    <div class="upload-placeholder">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <p>파일을 드래그하거나 클릭하여 업로드</p>
                    </div>
                </div>
                <div class="media-library-grid" id="mediaLibraryGrid">
                    <!-- 미디어 파일 그리드 -->
                </div>
                <div class="form-actions">
                    <button class="btn-secondary" onclick="contentEditor.closeModal('mediaLibraryModal')">취소</button>
                    <button class="btn-primary" onclick="contentEditor.selectMedia()">선택</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 변경사항 표시 -->
    <div class="changes-indicator" id="changesIndicator">
        <i class="fas fa-circle"></i>
        <span>저장되지 않은 변경사항</span>
    </div>

    <script src="js/content-editor.js"></script>
    <script src="js/notion-database.js"></script>
</body>
</html>
